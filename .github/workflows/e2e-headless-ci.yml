# Playwright E2E Matrix - WebGPU CI
name: E2E WebGPU

on:
  workflow_dispatch:
  # pull_request:
  #   branches:
  #     - main
  # workflow_run:
  #   workflows:
  #     - 'Deploy to GitHub Pages'
  #   types:
  #     - completed
  #   branches:
  #     - main

jobs:
  smoke:
    name: Chromium Headless Smoke
    # if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      PW_ENABLE_NO_SANDBOX: 1
      PW_WEBGPU_FLAGS: --enable-unsafe-webgpu,--use-angle=swiftshader
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm run test:e2e:install

      - name: Run smoke E2E spec
        run: pnpm run test:e2e:smoke

      - name: Upload Playwright smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            playwright-report
            playwright-results
            tests/**/__snapshots__
          if-no-files-found: ignore
          retention-days: 14

  full:
    name: Chromium Headless Full E2E
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 45
    env:
      CI: true
      PW_ENABLE_NO_SANDBOX: 1
      PW_WEBGPU_FLAGS: --enable-unsafe-webgpu,--use-angle=swiftshader
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm run test:e2e:install

      - name: Run full E2E suite
        run: pnpm run test:e2e:ci

      - name: Upload Playwright full artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-artifacts
          path: |
            playwright-report
            playwright-results
            tests/**/__snapshots__
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: playwright-results/**/trace.zip
          if-no-files-found: ignore
          retention-days: 14
