# Unit tests + TypeScript compile on pull requests (src changes only)
name: PR Unit Tests

on:
  pull_request:
    paths:
      - 'src/**'

permissions:
  contents: read

concurrency:
  group: pr-unit-tests-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  unit:
    name: Typecheck & Vitest
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run check:compile

      - name: Unit tests
        run: pnpm run test:unit:run
