# Playwright E2E Matrix - WebGPU CI
name: E2E WebGPU

on:
  workflow_run:
    workflows:
      - 'Deploy to GitHub Pages'
    types:
      - completed
    branches:
      - main

jobs:
  smoke:
    name: Chromium Headless Smoke
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: true
      PW_ENABLE_NO_SANDBOX: 1
      PW_WEBGPU_FLAGS: --enable-unsafe-webgpu,--use-angle=swiftshader
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Run smoke E2E spec
        run: npm run test:e2e:smoke

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-smoke-artifacts
          path: |
            playwright-report
            playwright-results

  full:
    name: Chromium Headless Full E2E
    runs-on: ubuntu-latest
    needs: smoke
    timeout-minutes: 45
    env:
      CI: true
      PW_ENABLE_NO_SANDBOX: 1
      PW_WEBGPU_FLAGS: --enable-unsafe-webgpu,--use-angle=swiftshader
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npm run test:e2e:install

      - name: Run full E2E suite
        run: npm run test:e2e:ci

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-full-artifacts
          path: |
            playwright-report
            playwright-results
